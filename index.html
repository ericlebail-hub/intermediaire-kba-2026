<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LIVE CHRONO - CLM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 20px; }
        h1 { text-align: center; color: #00ff00; text-transform: uppercase; }
        
        /* Bandeau dernier arrivant */
        #last-arrival {
            background: #000;
            border: 2px solid #00ff00;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #ffff00;
            margin-bottom: 20px;
            border-radius: 8px;
            min-height: 40px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* Tableau de classement */
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; font-size: 18px; }
        th { background-color: #444; color: #00ff00; padding: 12px; text-align: left; border-bottom: 2px solid #555; }
        td { padding: 10px; border-bottom: 1px solid #444; }
        tr:nth-child(even) { background-color: #333; }
        tr:first-child { background-color: rgba(0, 255, 0, 0.2); font-weight: bold; }
        .rank { width: 50px; text-align: center; color: #aaa; }
        .time { font-family: monospace; color: #00ff00; }
        .diff { font-family: monospace; color: #ff9900; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Classement Live - KBA 2026</h1>

    <div id="last-arrival">EN ATTENTE DU PREMIER TOP...</div>

    <table>
        <thead>
            <tr>
                <th class="rank">Pos</th>
                <th>Dossard</th>
                <th>Nom</th>
                <th>Club</th>
                <th>Temps</th>
                <th>Écart</th>
            </tr>
        </thead>
        <tbody id="classement-body">
            <!-- Les lignes s'afficheront ici -->
        </tbody>
    </table>

    <script>
        // --- CONFIGURATION ---
        const TOPIC = "clm_chrono/+/live"; 
        const BROKER = "wss://broker.hivemq.com:8884/mqtt";

        const client = mqtt.connect(BROKER);

        // RÉCUPÉRATION DES DONNÉES AU CHARGEMENT (Persistance)
        let classement = JSON.parse(localStorage.getItem('clm_backup')) || [];

        // Si on a déjà des données, on les affiche tout de suite
        if (classement.length > 0) {
            window.onload = () => {
                renderTable();
                // On affiche le dernier de la liste dans le bandeau par défaut au chargement
                updateBandeau(classement[classement.length - 1]); 
            };
        }

        client.on('connect', () => {
            console.log("Connecté au Live MQTT");
            client.subscribe(TOPIC);
        });

        client.on('message', (topic, message) => {
            const data = message.toString().split('|');
            // Format : Dossard|Nom|Club|Temps|Ecart
            const coureur = {
                dossard: data[0],
                nom: data[1],
                club: data[2],
                temps: data[3],
                ecart: data[4]
            };

            // 1. Mise à jour du bandeau avec l'écart
            updateBandeau(coureur);

            // 2. Mise à jour de la liste locale
            const index = classement.findIndex(c => c.dossard === coureur.dossard);
            if (index !== -1) {
                classement[index] = coureur;
            } else {
                classement.push(coureur);
            }

            // 3. Tri par temps
            classement.sort((a, b) => a.temps.localeCompare(b.temps));

            // 4. Sauvegarde dans le navigateur
            localStorage.setItem('clm_backup', JSON.stringify(classement));

            // 5. Rafraîchissement du tableau
            renderTable();
        });

        function updateBandeau(c) {
            const labelEcart = (c.ecart === "LEADER") ? "MEILLEUR TEMPS" : `ÉCART : ${c.ecart}`;
            document.getElementById('last-arrival').innerHTML = 
                `DERNIER PASSAGE : ${c.nom} <br> <span style="color:#00ff00">${c.temps}</span> — <span style="color:#ff9900">${labelEcart}</span>`;
        }

        function renderTable() {
            const body = document.getElementById('classement-body');
            body.innerHTML = "";

            classement.forEach((c, i) => {
                const row = `<tr>
                    <td class="rank">${i + 1}</td>
                    <td>${c.dossard}</td>
                    <td>${c.nom}</td>
                    <td>${c.club}</td>
                    <td class="time">${c.temps}</td>
                    <td class="diff">${c.ecart}</td>
                </tr>`;
                body.innerHTML += row;
            });
        }
    </script>
</body>
</html>
