<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LIVE CHRONO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 20px; }
        #last-arrival {
            background: #000; border: 2px solid #00ff00; padding: 20px;
            text-align: center; border-radius: 10px; margin-bottom: 25px;
        }
        .b-name { font-size: 28px; font-weight: bold; display: block; }
        .b-time { font-size: 36px; color: #00ff00; font-family: monospace; }
        .b-gap { font-size: 22px; color: #ff9900; margin-left: 15px; }
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; }
        th { background-color: #444; color: #00ff00; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #444; }
        .time, .diff { font-family: monospace; }
    </style>
</head>

<body>

    <div id="last-arrival">
        <span class="b-name">EN ATTENTE DU PREMIER TOP...</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th>Dossard</th>
                <th>Nom</th>
                <th>Club</th>
                <th>Temps</th>
                <th>Écart</th>
            </tr>
        </thead>
        <tbody id="classement-body"></tbody>
    </table>

    <script>
        // 🔥 NOUVEAU LIVE JSON
        const TOPICS = [
            "clm_chrono/+/pk1",
            "clm_chrono/+/pk2",
            "clm_chrono/+/arrivee"
        ];

        const BROKER = "wss://broker.hivemq.com:8884/mqtt";
        const client = mqtt.connect(BROKER);

        let classement = JSON.parse(localStorage.getItem('clm_save')) || [];

        client.on('connect', () => {
            TOPICS.forEach(t => client.subscribe(t));
        });

        client.on('message', (topic, message) => {
            let data;
            try {
                data = JSON.parse(message.toString());
            } catch {
                return;
            }

            if (!data.dossard || !data.temps) return;

            const coureur = {
                dossard: data.dossard,
                nom: data.nom,
                club: data.club,
                temps: data.temps,
                ecart: data.ecart || "",
                point: data.point
            };

            // Mise à jour ou ajout
            const idx = classement.findIndex(c => c.dossard === coureur.dossard);
            if (idx !== -1) {
                classement[idx] = coureur;
            } else {
                classement.push(coureur);
                if (coureur.point === "ARRIVEE") updateBandeau(coureur);
            }

            // Tri robuste
            classement.sort((a, b) =>
                a.temps.padStart(12, '0').localeCompare(b.temps.padStart(12, '0'))
            );

            localStorage.setItem('clm_save', JSON.stringify(classement));
            renderTable();
        });

        function updateBandeau(c) {
            const displayGap = (c.ecart === "LEADER") ? "MEILLEUR TEMPS" : "+" + c.ecart;
            document.getElementById('last-arrival').innerHTML = `
                <span class="b-name">${c.nom} (n°${c.dossard})</span>
                <span class="b-time">${c.temps}</span>
                <span class="b-gap">${displayGap}</span>
            `;
        }

        function renderTable() {
            const body = document.getElementById('classement-body');
            body.innerHTML = classement.map((c, i) => `
                <tr>
                    <td><b>${i + 1}</b></td>
                    <td>${c.dossard}</td>
                    <td>${c.nom}</td>
                    <td>${c.club}</td>
                    <td class="time" style="color:#00ff00">${c.temps}</td>
                    <td class="diff" style="color:#ff9900">${c.ecart === "LEADER" ? "LEADER" : "+" + c.ecart}</td>
                </tr>
            `).join('');
        }

        renderTable();
    </script>

</body>
</html>
