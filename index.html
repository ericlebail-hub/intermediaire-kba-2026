<!DOCTYPE html>
<html>
<head>
    <title>LIVE CLM CHRONO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        #classement { width: 80%; margin: auto; border-collapse: collapse; font-size: 24px; }
        th, td { border-bottom: 1px solid #444; padding: 15px; }
        .leader { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>CHRONO LIVE - RÉSULTATS</h1>
    <div id="status">Connexion au broker...</div>
    <table id="classement">
        <thead>
            <tr>
                <th>Rang</th><th>Dossard</th><th>Nom</th><th>Club</th><th>Temps</th><th>Écart</th>
            </tr>
        </thead>
        <tbody id="result-body">
            <!-- Les résultats s'afficheront ici -->
        </tbody>
    </table>

    <script>
        // CONFIGURATION - DOIT CORRESPONDRE AU LOGICIEL
        // Remplacez 'Nom_De_Votre_Course' par le nom du fichier .db (sans le .db)
        const topic = "clm_chrono/+/live"; 
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "web_client_" + Math.random());

        client.onMessageArrived = (message) => {
            const data = message.payloadString.split('|');
            // Format reçu : Dossard|Nom|Club|Temps|Ecart
            ajouterLigne(data[0], data[1], data[2], data[3], data[4]);
        };

        client.connect({ onSuccess: () => {
            document.getElementById('status').innerText = "Connecté au Live !";
            client.subscribe(topic);
        }});

        function ajouterLigne(dossard, nom, club, temps, ecart) {
            const body = document.getElementById('result-body');
            const row = body.insertRow(0); // Ajoute en haut
            if(ecart === "LEADER") row.className = "leader";
            row.innerHTML = `<td>-</td><td>${dossard}</td><td>${nom}</td><td>${club}</td><td>${temps}</td><td>${ecart}</td>`;
        }
    </script>
</body>
</html>
