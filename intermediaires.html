<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LIVE PK1 / PK2 – BZH PAR EQUIPE U19H</title>

    <script src="mqtt.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 20px; }

        .tabs { display: flex; margin-bottom: 20px; }
        .tab {
            padding: 12px 25px;
            background: #333;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }
        .tab.active { background: #00aaff; }

        .bandeau {
            background: #000; border: 2px solid #00aaff; padding: 20px;
            text-align: center; border-radius: 10px; margin-bottom: 25px;
        }
        .b-name { font-size: 28px; font-weight: bold; display: block; }
        .b-time { font-size: 32px; color: #00aaff; font-family: monospace; }

        table { width: 100%; border-collapse: collapse; background: #2d2d2d; }
        th { background-color: #444; color: #00aaff; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #444; }
        .time { font-family: monospace; color: #00aaff; }

        .hidden { display: none; }
    </style>
</head>

<body>

    <div class="tabs">
        <div class="tab active" onclick="showTab('pk1')">PK1</div>
        <div class="tab" onclick="showTab('pk2')">PK2</div>
    </div>

    <div id="pk1" class="tab-content">
        <div id="bandeau-pk1" class="bandeau">
            <span class="b-name">EN ATTENTE DU PREMIER PASSAGE PK1...</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Dossard</th>
                    <th>Nom</th>
                    <th>Temps brut</th>
                    <th>Écart</th>
                </tr>
            </thead>
            <tbody id="table-pk1"></tbody>
        </table>
    </div>

    <div id="pk2" class="tab-content hidden">
        <div id="bandeau-pk2" class="bandeau" style="border-color:#ffaa00;">
            <span class="b-name">EN ATTENTE DU PREMIER PASSAGE PK2...</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Dossard</th>
                    <th>Nom</th>
                    <th>Temps brut</th>
                    <th>Écart</th>
                </tr>
            </thead>
            <tbody id="table-pk2"></tbody>
        </table>
    </div>

    <script>
    const COURSE = "BZH_PAR_EQUIPE_U19H";
    const BROKER = "wss://broker.emqx.io:8084/mqtt";

    const TOPIC_PK1 = `clm_chrono/${COURSE}/pk1`;
    const TOPIC_PK2 = `clm_chrono/${COURSE}/pk2`;

    let client;
    let reconnectTimer = null;

    let pk1 = [];
    let pk2 = [];

    const statusDiv = document.createElement("div");
    statusDiv.style.position = "fixed";
    statusDiv.style.top = "10px";
    statusDiv.style.right = "10px";
    statusDiv.style.padding = "8px 14px";
    statusDiv.style.borderRadius = "6px";
    statusDiv.style.fontWeight = "bold";
    statusDiv.style.background = "#444";
    statusDiv.style.color = "white";
    statusDiv.innerText = "Connexion...";
    document.body.appendChild(statusDiv);

    function updateStatus(connected) {
        if (connected) {
            statusDiv.style.background = "#0a0";
            statusDiv.innerText = "CONNECTÉ";
        } else {
            statusDiv.style.background = "#a00";
            statusDiv.innerText = "DÉCONNECTÉ – reconnexion...";
        }
    }

    function connectMqtt() {
        updateStatus(false);

        client = mqtt.connect(BROKER, {
            reconnectPeriod: 0,
            connectTimeout: 4000
        });

        client.on("connect", () => {
            updateStatus(true);
            client.subscribe(TOPIC_PK1);
            client.subscribe(TOPIC_PK2);

            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        });

        client.on("error", () => {
            updateStatus(false);
            scheduleReconnect();
        });

        client.on("close", () => {
            updateStatus(false);
            scheduleReconnect();
        });

        client.on("message", (topic, message) => {
            let data;
            try { data = JSON.parse(message.toString()); }
            catch { return; }

            // -------------------------------
            // MESSAGE "LAST"
            // -------------------------------
            if (data.type === "last") {
                updateBandeau(data);
                return;
            }

            // -------------------------------
            // MESSAGE "FULL"
            // -------------------------------
            if (data.type === "full") {
                if (topic.includes("/pk1")) {
                    pk1 = data.data;
                    renderTable("pk1");
                }
                if (topic.includes("/pk2")) {
                    pk2 = data.data;
                    renderTable("pk2");
                }
                return;
            }

            // -------------------------------
            // MESSAGE "DELETE"
            // -------------------------------
            if (data.delete === true) {
                if (topic.includes("/pk1")) {
                    pk1 = pk1.filter(c => c.dossard !== data.dossard);
                    renderTable("pk1");
                }
                if (topic.includes("/pk2")) {
                    pk2 = pk2.filter(c => c.dossard !== data.dossard);
                    renderTable("pk2");
                }
                return;
            }
        });
    }

    function scheduleReconnect() {
        if (!reconnectTimer) {
            reconnectTimer = setTimeout(connectMqtt, 3000);
        }
    }

    connectMqtt();

    // ============================================================
    // BANDEAUX
    // ============================================================

    function updateBandeau(data) {
        const point = data.point.toLowerCase();
        const div = document.getElementById(`bandeau-${point}`);

        div.innerHTML = `
            <span class="b-name">${data.nom} (n°${data.dossard})</span>
            <span class="b-time">${data.temps} — ${data.ecart}</span>
        `;
    }

    // ============================================================
    // TABLEAUX PK1 / PK2
    // ============================================================

    function renderTable(point) {
        const list = point === "pk1" ? pk1 : pk2;
        const body = document.getElementById(`table-${point}`);

        body.innerHTML = list.map((c, i) => `
            <tr class="${c.highlight ? 'highlight' : ''}">
                <td><b>${i + 1}</b></td>
                <td>${c.dossard}</td>
                <td>${c.nom}</td>
                <td class="time">${c.temps}</td>
                <td class="time">${c.ecart}</td>
            </tr>
        `).join('');
    }

    // ============================================================
    // ONGLET PK1 / PK2
    // ============================================================

    function showTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

        document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
        document.getElementById(tab).classList.remove('hidden');
    }
</script>

</body>
</html>
