<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LIVE PK1 / PK2 – BZH PAR EQUIPE U19H</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 20px; }

        /* Onglets */
        .tabs { display: flex; margin-bottom: 20px; }
        .tab {
            padding: 12px 25px;
            background: #333;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }
        .tab.active { background: #00aaff; }

        /* Bandeaux */
        .bandeau {
            background: #000; border: 2px solid #00aaff; padding: 20px;
            text-align: center; border-radius: 10px; margin-bottom: 25px;
        }
        .b-name { font-size: 28px; font-weight: bold; display: block; }
        .b-time { font-size: 36px; color: #00aaff; font-family: monospace; }

        /* Tableaux */
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; }
        th { background-color: #444; color: #00aaff; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #444; }
        .time { font-family: monospace; color: #00aaff; }

        .hidden { display: none; }
    </style>
</head>

<body>

    <!-- ONGLETES -->
    <div class="tabs">
        <div class="tab active" onclick="showTab('pk1')">PK1</div>
        <div class="tab" onclick="showTab('pk2')">PK2</div>
    </div>

    <!-- PK1 -->
    <div id="pk1" class="tab-content">
        <div id="bandeau-pk1" class="bandeau">
            <span class="b-name">EN ATTENTE DU PREMIER PASSAGE PK1...</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Dossard</th>
                    <th>Nom</th>
                    <th>Club</th>
                    <th>PK1</th>
                </tr>
            </thead>
            <tbody id="table-pk1"></tbody>
        </table>
    </div>

    <!-- PK2 -->
    <div id="pk2" class="tab-content hidden">
        <div id="bandeau-pk2" class="bandeau" style="border-color:#ffaa00;">
            <span class="b-name">EN ATTENTE DU PREMIER PASSAGE PK2...</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Dossard</th>
                    <th>Nom</th>
                    <th>Club</th>
                    <th>PK2</th>
                </tr>
            </thead>
            <tbody id="table-pk2"></tbody>
        </table>
    </div>

    <script>
        const COURSE = "BZH_PAR_EQUIPE_U19H";   // 🔥 TON NOM EXACT DE COURSE
        const BROKER = "wss://broker.hivemq.com:8884/mqtt";

        const client = mqtt.connect(BROKER);

        const TOPIC_PK1 = `clm_chrono/${COURSE}/pk1`;
        const TOPIC_PK2 = `clm_chrono/${COURSE}/pk2`;

        let pk1 = [];
        let pk2 = [];

        client.on('connect', () => {
            client.subscribe(TOPIC_PK1);
            client.subscribe(TOPIC_PK2);
        });

        client.on('message', (topic, message) => {
            let data;
            try { data = JSON.parse(message.toString()); }
            catch { return; }

            if (!data.dossard || !data.temps) return;

            const coureur = {
                dossard: data.dossard,
                nom: data.nom,
                club: data.club,
                temps: data.temps
            };

            if (topic.includes("/pk1")) updatePK(pk1, coureur, "pk1");
            if (topic.includes("/pk2")) updatePK(pk2, coureur, "pk2");
        });

        function updatePK(list, coureur, point) {
            const idx = list.findIndex(c => c.dossard === coureur.dossard);
            if (idx !== -1) list[idx] = coureur;
            else {
                list.push(coureur);
                updateBandeau(point, coureur);
            }

            list.sort((a, b) =>
                a.temps.padStart(12, '0').localeCompare(b.temps.padStart(12, '0'))
            );

            renderTable(point);
        }

        function updateBandeau(point, c) {
            document.getElementById(`bandeau-${point}`).innerHTML = `
                <span class="b-name">${c.nom} (n°${c.dossard})</span>
                <span class="b-time">${c.temps}</span>
            `;
        }

        function renderTable(point) {
            const list = point === "pk1" ? pk1 : pk2;
            const body = document.getElementById(`table-${point}`);

            body.innerHTML = list.map((c, i) => `
                <tr>
                    <td><b>${i + 1}</b></td>
                    <td>${c.dossard}</td>
                    <td>${c.nom}</td>
                    <td>${c.club}</td>
                    <td class="time">${c.temps}</td>
                </tr>
            `).join('');
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.remove('hidden');
        }
    </script>

</body>
</html>
